name: Development Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Set up JDK 8 (Azul Zulu for Apple Silicon)
      uses: actions/setup-java@v4
      id: setup-java
      with:
        java-version: '8'
        distribution: 'zulu'

    - name: Install System Dependencies
      run: |
        brew install automake autoconf libtool ldid wget make
        sudo mkdir -p /usr/local/bin
        sudo ln -s /opt/homebrew/bin/gmake /usr/local/bin/gmake
        echo "Created gmake compatibility link at /usr/local/bin/gmake"

    - name: Run Project Makefile
      run: |
        JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
        export PATH="$JDK_BASE_PATH/bin:$PATH"
        make JAVA_HOME="$JDK_BASE_PATH" BOOTJDK="$JDK_BASE_PATH/bin"

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj') }}

    - name: Find Scheme and Build Xcode Project
      run: |
        JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
        SCHEME_NAME=$(xcodebuild -project Amethyst.xcodeproj -list | awk '/Schemes:/{flag=1;next} /^$/{flag=0} flag' | sed 's/^[[:space:]]*//' | head -n 1)
        echo "Detected Scheme Name: '$SCHEME_NAME'"
        
        if [ -z "$SCHEME_NAME" ]; then
          echo "Error: Could not automatically detect an Xcode scheme!"
          exit 1
        fi
        
        echo "TARGET_SCHEME=$SCHEME_NAME" >> $GITHUB_ENV
        
        xcodebuild -project Amethyst.xcodeproj \
                   -scheme "$SCHEME_NAME" \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   JAVA_HOME="$JDK_BASE_PATH" \
                   BOOTJDK="$JDK_BASE_PATH/bin" \
                   clean build

    - name: Package App into IPA
      run: |
        mkdir -p Payload
        
        # Search for the built .app bundle in common Makefile output paths
        if [ -d "bin/release-iphoneos/Angel Aura Amethyst.app" ]; then
          cp -r "bin/release-iphoneos/Angel Aura Amethyst.app" Payload/
        elif [ -d "bin/release-iphoneos/PojavLauncher.app" ]; then
          cp -r "bin/release-iphoneos/PojavLauncher.app" Payload/
        elif ls bin/*.app 1> /dev/null 2>&1; then
          cp -r bin/*.app Payload/
        elif ls bin/release-iphoneos/*.app 1> /dev/null 2>&1; then
          cp -r bin/release-iphoneos/*.app Payload/
        else
          echo "Fallback: Checking standard Xcode location..."
          cp -r ~/Library/Developer/Xcode/DerivedData/Amethyst-*/Build/Products/Release-iphoneos/*.app Payload/ || true
        fi
        
        # Verify if we found an app bundle to zip
        if [ -z "$(ls -A Payload)" ]; then
          echo "Error: No compiled .app bundle found anywhere! Printing workspace files for debugging:"
          find . -name "*.app" -type d
          exit 1
        fi
        
        zip -r Amethyst.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: Amethyst-iOS-Build
        path: Amethyst.ipa
